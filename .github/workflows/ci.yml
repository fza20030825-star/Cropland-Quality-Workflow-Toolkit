name: CI

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Compile Python sources
        run: |
          python -m compileall src run.py run_merge_shp_ui.py run_membership_ui.py run_update_scores_ui.py run_update_land_blocks_ui.py run_area_balance_ui.py

      - name: Run tests
        env:
          PYTHONPATH: src
        run: |
          python -m pytest
